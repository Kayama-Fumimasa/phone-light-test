<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Phone Laser Pointer Test</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #05060a;
      color: white;
    }

    #app {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #05060a;
    }

    .centerPanel {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(88vw, 460px);
      max-height: 88vh;
      overflow-y: auto;
      padding: 28px;
      border-radius: 28px;
      text-align: center;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 20px 80px rgba(0,0,0,0.4);
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 22px;
      font-weight: 650;
    }

    p {
      margin: 0;
      font-size: 14px;
      line-height: 1.75;
      color: rgba(255,255,255,0.72);
    }

    #qr {
      width: 230px;
      height: 230px;
      margin-top: 24px;
      padding: 12px;
      border-radius: 18px;
      background: white;
      object-fit: contain;
    }

    #qrError {
      display: none;
      margin-top: 20px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.1);
      font-size: 13px;
      line-height: 1.7;
      color: rgba(255,255,255,0.72);
    }

    #roomText {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.52);
      word-break: break-all;
    }

    .urlBox {
      width: 100%;
      min-height: 78px;
      margin-top: 16px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      background: rgba(0,0,0,0.28);
      color: rgba(255,255,255,0.72);
      font-size: 11px;
      line-height: 1.5;
      resize: none;
      outline: none;
      user-select: text;
      -webkit-user-select: text;
    }

    .smallButton {
      margin-top: 12px;
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 650;
      color: #05060a;
      background: white;
      cursor: pointer;
    }

    #status {
      position: fixed;
      left: 18px;
      bottom: 16px;
      z-index: 20;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      max-width: calc(100vw - 36px);
      word-break: break-all;
    }

    .phoneScreen {
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.16), transparent 30%),
        #05060a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      text-align: center;
    }

    .phoneCard {
      width: 100%;
      max-width: 430px;
      padding: 30px 24px;
      border-radius: 30px;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 20px 80px rgba(0,0,0,0.45);
    }

    .phoneTitle {
      font-size: 22px;
      font-weight: 650;
      margin-bottom: 12px;
    }

    .phoneText {
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255,255,255,0.7);
      margin-bottom: 24px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 17px 20px;
      font-size: 17px;
      font-weight: 650;
      color: #05060a;
      background: white;
      cursor: pointer;
    }

    button.secondary {
      margin-top: 12px;
      color: white;
      background: rgba(255,255,255,0.18);
    }

    button:active {
      transform: scale(0.98);
    }

    .smallText {
      margin-top: 18px;
      font-size: 12px;
      line-height: 1.7;
      color: rgba(255,255,255,0.45);
    }

    .meter {
      margin-top: 22px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .meterFill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: white;
      transition: width 0.06s linear;
    }

    .touchPad {
      margin-top: 18px;
      width: 100%;
      height: 150px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.16), transparent 18%),
        rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    .touchPadLabel {
      position: absolute;
      left: 0;
      right: 0;
      top: 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.38);
      pointer-events: none;
    }

    .touchDot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: white;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 24px rgba(255,255,255,0.85);
      pointer-events: none;
    }

    a {
      color: white;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div id="status">loading...</div>

  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyDAbRihqZUzLjBEmUDcRKztlSbgxkESs4M",
      authDomain: "phone-light-test.firebaseapp.com",
      databaseURL: "https://phone-light-test-default-rtdb.firebaseio.com/",
      projectId: "phone-light-test",
      storageBucket: "phone-light-test.firebasestorage.app",
      messagingSenderId: "720544705799",
      appId: "1:720544705799:web:d417c7dbaebc7f8f6e29a2",
      measurementId: "G-8524Q5F6WQ"
    };

    const FIREBASE_APP_URL =
      "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

    const FIREBASE_DATABASE_URL =
      "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const appEl = document.getElementById("app");
    const statusEl = document.getElementById("status");

    let db = null;
    let dbRef = null;
    let dbSet = null;
    let dbOnValue = null;

    window.addEventListener("error", (event) => {
      statusEl.textContent = "error: " + event.message;
      console.error(event.error || event.message);
    });

    window.addEventListener("unhandledrejection", (event) => {
      statusEl.textContent = "promise error: " + event.reason;
      console.error(event.reason);
    });

    boot();

    async function boot() {
      try {
        const firebaseModules = await Promise.all([
          import(FIREBASE_APP_URL),
          import(FIREBASE_DATABASE_URL)
        ]);

        const { initializeApp } = firebaseModules[0];
        const { getDatabase, ref, set, onValue } = firebaseModules[1];

        const firebaseApp = initializeApp(firebaseConfig);
        db = getDatabase(firebaseApp);

        dbRef = ref;
        dbSet = set;
        dbOnValue = onValue;

        const params = new URLSearchParams(location.search);
        const mode = params.get("mode") || "display";

        if (mode === "phone") {
          startPhone(params);
        } else {
          startDisplay();
        }
      } catch (error) {
        showFatalError(
          "ページの初期化に失敗しました",
          "JavaScript の読み込み、または初期化の途中でエラーが発生しました。ブラウザの Console も確認してください。",
          error
        );
      }
    }

    function showFatalError(title, message, error) {
      appEl.innerHTML = `
        <div class="phoneScreen">
          <div class="phoneCard">
            <div class="phoneTitle">${escapeHtml(title)}</div>
            <div class="phoneText">${escapeHtml(message)}</div>
            <div class="smallText">${escapeHtml(String(error && error.message ? error.message : error))}</div>
          </div>
        </div>
      `;

      statusEl.textContent = "fatal error";
      console.error(error);
    }

    function makeRoomId() {
      return Math.random().toString(36).slice(2, 8);
    }

    function makeSessionId() {
      return Date.now().toString(36) + "-" + makeRoomId();
    }

    function getCleanPageUrl() {
      const url = new URL(location.href);
      url.search = "";
      url.hash = "";
      return url.href;
    }

    function makePhoneUrl(room, sessionId) {
      const url = new URL(getCleanPageUrl());
      url.searchParams.set("mode", "phone");
      url.searchParams.set("room", room);
      url.searchParams.set("session", sessionId);
      return url.href;
    }

    function makeQrUrl(text) {
      return "https://api.qrserver.com/v1/create-qr-code/?size=480x480&data=" +
        encodeURIComponent(text);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function validNumber(value, fallback = 0) {
      if (typeof value === "number" && Number.isFinite(value)) {
        return value;
      }
      return fallback;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function startDisplay() {
      const room = makeRoomId();
      const sessionId = makeSessionId();
      const phoneUrl = makePhoneUrl(room, sessionId);

      appEl.innerHTML = `
        <canvas id="canvas"></canvas>

        <div class="centerPanel" id="qrPanel">
          <h1>スマホを接続</h1>
          <p>
            スマホで QR コードを読み取り、<br>
            センサーを開始してください。
          </p>

          <img id="qr" alt="QR code" />

          <div id="qrError">
            QR 画像を読み込めませんでした。<br>
            下のスマホ用リンクをコピーして、スマホのブラウザで開いてください。
          </div>

          <textarea class="urlBox" id="phoneUrlBox" readonly></textarea>
          <button class="smallButton" id="copyButton">スマホ用リンクをコピー</button>

          <div id="roomText">
            room: ${escapeHtml(room)}<br>
            session: ${escapeHtml(sessionId)}
          </div>
        </div>
      `;

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const qrPanel = document.getElementById("qrPanel");
      const qrImg = document.getElementById("qr");
      const qrError = document.getElementById("qrError");
      const phoneUrlBox = document.getElementById("phoneUrlBox");
      const copyButton = document.getElementById("copyButton");

      phoneUrlBox.value = phoneUrl;
      qrImg.src = makeQrUrl(phoneUrl);

      qrImg.addEventListener("error", () => {
        qrImg.style.display = "none";
        qrError.style.display = "block";
        statusEl.textContent = "QR image failed / use phone link";
      });

      copyButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(phoneUrl);
          copyButton.textContent = "コピーしました";
          setTimeout(() => {
            copyButton.textContent = "スマホ用リンクをコピー";
          }, 1200);
        } catch (error) {
          phoneUrlBox.focus();
          phoneUrlBox.select();
          copyButton.textContent = "手動でコピーしてください";
        }
      });

      let width = 0;
      let height = 0;

      let targetX = 0.5;
      let targetY = 0.5;
      let smoothX = 0.5;
      let smoothY = 0.5;
      let connected = false;

      function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        width = window.innerWidth;
        height = window.innerHeight;

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      const pointerRef = dbRef(db, `rooms/${room}/sessions/${sessionId}/pointer`);

      dbOnValue(pointerRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        if (data.sessionId !== sessionId) return;
        if (data.state !== "active") return;

        targetX = clamp(validNumber(data.pointerX, 0.5), 0, 1);
        targetY = clamp(validNumber(data.pointerY, 0.5), 0, 1);

        connected = true;
        statusEl.textContent =
          `connected / x:${targetX.toFixed(2)} y:${targetY.toFixed(2)} / ${data.mode || "sensor"}`;

        if (qrPanel) {
          qrPanel.style.opacity = "0";
          qrPanel.style.pointerEvents = "none";
        }
      }, (error) => {
        statusEl.textContent = "Firebase read error";
        console.error(error);
      });

      function drawLight() {
        if (connected) {
          smoothX += (targetX - smoothX) * 0.62;
          smoothY += (targetY - smoothY) * 0.62;
        }

        const dotX = smoothX * width;
        const dotY = smoothY * height;

        ctx.fillStyle = "rgba(5, 6, 10, 0.18)";
        ctx.fillRect(0, 0, width, height);

        const glow = ctx.createRadialGradient(dotX, dotY, 0, dotX, dotY, 180);
        glow.addColorStop(0, "rgba(255,255,255,1)");
        glow.addColorStop(0.06, "rgba(255,255,255,0.96)");
        glow.addColorStop(0.22, "rgba(180,210,255,0.45)");
        glow.addColorStop(1, "rgba(180,210,255,0)");

        ctx.beginPath();
        ctx.fillStyle = glow;
        ctx.arc(dotX, dotY, 180, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,255,255,0.28)";
        ctx.lineWidth = 1;
        ctx.arc(dotX, dotY, 22, 0, Math.PI * 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = "rgba(255,255,255,1)";
        ctx.arc(dotX, dotY, 7, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(drawLight);
      }

      ctx.fillStyle = "#05060a";
      ctx.fillRect(0, 0, width, height);

      statusEl.textContent = "waiting for phone";
      drawLight();
    }

    function startPhone(params) {
      const room = params.get("room");
      const sessionId = params.get("session");

      if (!room || !sessionId) {
        appEl.innerHTML = `
          <div class="phoneScreen">
            <div class="phoneCard">
              <div class="phoneTitle">接続情報がありません</div>
              <div class="phoneText">
                パソコン画面の QR コード、またはスマホ用リンクから開いてください。
              </div>
            </div>
          </div>
        `;
        statusEl.textContent = "no room or session";
        return;
      }

      appEl.innerHTML = `
        <div class="phoneScreen">
          <div class="phoneCard">
            <div class="phoneTitle">レーザーポインター</div>
            <div class="phoneText">
              スマホをパソコン画面の中心に向けて、<br>
              「センサーを開始」を押してください。
            </div>

            <button id="startButton">センサーを開始</button>
            <button id="centerButton" class="secondary">中心を再設定</button>

            <div class="meter">
              <div class="meterFill" id="meterFill"></div>
            </div>

            <div class="touchPad" id="touchPad">
              <div class="touchPadLabel">センサーが使えない場合はここをなぞる</div>
              <div class="touchDot" id="touchDot"></div>
            </div>

            <div class="smallText" id="phoneInfo">
              まずスマホを画面中央に向けてください。
            </div>
          </div>
        </div>
      `;

      const startButton = document.getElementById("startButton");
      const centerButton = document.getElementById("centerButton");
      const phoneInfo = document.getElementById("phoneInfo");
      const meterFill = document.getElementById("meterFill");
      const touchPad = document.getElementById("touchPad");
      const touchDot = document.getElementById("touchDot");

      const pointerRef = dbRef(db, `rooms/${room}/sessions/${sessionId}/pointer`);

      let latestBeta = 0;
      let latestGamma = 0;

      let centerBeta = 0;
      let centerGamma = 0;

      let pointerX = 0.5;
      let pointerY = 0.5;

      let hasOrientation = false;
      let centerReady = false;
      let pendingCenterReset = false;

      let lastSendTime = 0;
      let sensorStarted = false;
      let usingTouchPad = false;
      let touchActive = false;

      const rangeAngleX = 16;
      const rangeAngleY = 14;

      function angleToScreenOffset(deltaAngle, rangeAngle) {
        const rad = Math.PI / 180;
        return Math.tan(deltaAngle * rad) / (2 * Math.tan(rangeAngle * rad));
      }

      function deadzone(value, zone = 0.05) {
        if (Math.abs(value) < zone) return 0;
        return value;
      }

      async function requestPermissions() {
        let orientationAllowed = true;

        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const result = await DeviceOrientationEvent.requestPermission();
          orientationAllowed = result === "granted";
        }

        return orientationAllowed;
      }

      function updateMeter() {
        const moveAmount =
          Math.abs(pointerX - 0.5) +
          Math.abs(pointerY - 0.5);

        meterFill.style.width = clamp(moveAmount * 180, 0, 100) + "%";
      }

      function updateTouchDot() {
        touchDot.style.left = (pointerX * 100) + "%";
        touchDot.style.top = (pointerY * 100) + "%";
      }

      function sendPointer(force = false) {
        const now = Date.now();

        if (!force && now - lastSendTime < 33) return;
        lastSendTime = now;

        updateMeter();
        updateTouchDot();

        dbSet(pointerRef, {
          state: "active",
          sessionId: sessionId,
          pointerX: pointerX,
          pointerY: pointerY,
          beta: latestBeta,
          gamma: latestGamma,
          mode: usingTouchPad ? "touch" : "sensor",
          time: now
        }).catch((error) => {
          phoneInfo.textContent = "Firebase への送信に失敗しました。Rules を確認してください。";
          statusEl.textContent = "firebase write error";
          console.error(error);
        });

        statusEl.textContent =
          `sending / x:${pointerX.toFixed(2)} y:${pointerY.toFixed(2)}`;
      }

      function setCurrentDirectionAsCenter() {
        centerBeta = latestBeta;
        centerGamma = latestGamma;
        centerReady = true;
        usingTouchPad = false;

        pointerX = 0.5;
        pointerY = 0.5;

        sendPointer(true);

        phoneInfo.textContent = "現在のスマホの向きを画面中心として設定しました。";
      }

      function requestCenterReset() {
        if (hasOrientation) {
          setCurrentDirectionAsCenter();
        } else {
          pendingCenterReset = true;
          phoneInfo.textContent = "センサー値を取得したら中心を設定します。";
        }
      }

      function handleOrientation(event) {
        if (usingTouchPad) return;

        const beta = validNumber(event.beta, latestBeta);
        const gamma = validNumber(event.gamma, latestGamma);

        latestBeta = beta;
        latestGamma = gamma;
        hasOrientation = true;

        if (!centerReady || pendingCenterReset) {
          pendingCenterReset = false;
          setCurrentDirectionAsCenter();
        }

        const deltaBeta = deadzone(beta - centerBeta);
        const deltaGamma = deadzone(gamma - centerGamma);

        const offsetX = angleToScreenOffset(deltaGamma, rangeAngleX);
        const offsetY = angleToScreenOffset(deltaBeta, rangeAngleY);

        pointerX = clamp(0.5 - offsetX, 0, 1);
        pointerY = clamp(0.5 - offsetY, 0, 1);

        sendPointer(false);
      }

      function setPointerFromTouch(event) {
        const rect = touchPad.getBoundingClientRect();

        pointerX = clamp((event.clientX - rect.left) / rect.width, 0, 1);
        pointerY = clamp((event.clientY - rect.top) / rect.height, 0, 1);

        usingTouchPad = true;
        phoneInfo.textContent = "タッチ操作で送信しています。センサーに戻す場合は中心を再設定してください。";

        sendPointer(true);
      }

      startButton.addEventListener("click", async () => {
        try {
          const allowed = await requestPermissions();

          if (!allowed) {
            phoneInfo.textContent = "センサーの使用が許可されませんでした。下のエリアをなぞると手動操作できます。";
            statusEl.textContent = "permission denied";
            return;
          }

          if (!sensorStarted) {
            window.addEventListener("deviceorientation", handleOrientation, true);
            sensorStarted = true;
          }

          pendingCenterReset = true;
          usingTouchPad = false;

          startButton.textContent = "センサー作動中";
          phoneInfo.textContent = "スマホを画面中央に向けたまま、少し待ってください。";
          statusEl.textContent = `room: ${room} / sensor started`;
        } catch (error) {
          phoneInfo.textContent = "センサー開始時にエラーが発生しました。下のエリアをなぞると手動操作できます。";
          statusEl.textContent = "sensor error";
          console.error(error);
        }
      });

      centerButton.addEventListener("click", () => {
        requestCenterReset();
      });

      touchPad.addEventListener("pointerdown", (event) => {
        touchActive = true;
        touchPad.setPointerCapture(event.pointerId);
        setPointerFromTouch(event);
      });

      touchPad.addEventListener("pointermove", (event) => {
        if (!touchActive) return;
        setPointerFromTouch(event);
      });

      touchPad.addEventListener("pointerup", () => {
        touchActive = false;
      });

      touchPad.addEventListener("pointercancel", () => {
        touchActive = false;
      });

      statusEl.textContent = `room: ${room}`;
      updateTouchDot();
    }
  </script>
</body>
</html>
