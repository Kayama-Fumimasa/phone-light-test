<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Phone Laser Pointer Test</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #05060a;
      color: white;
    }

    #app {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #05060a;
    }

    .centerPanel {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(88vw, 440px);
      padding: 28px;
      border-radius: 28px;
      text-align: center;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 20px 80px rgba(0,0,0,0.4);
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 22px;
      font-weight: 650;
    }

    p {
      margin: 0;
      font-size: 14px;
      line-height: 1.75;
      color: rgba(255,255,255,0.72);
    }

    #qr {
      width: 230px;
      height: 230px;
      margin-top: 24px;
      padding: 12px;
      border-radius: 18px;
      background: white;
    }

    #roomText {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.52);
      word-break: break-all;
    }

    #status {
      position: fixed;
      left: 18px;
      bottom: 16px;
      z-index: 20;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }

    .phoneScreen {
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.16), transparent 30%),
        #05060a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      text-align: center;
    }

    .phoneCard {
      width: 100%;
      max-width: 430px;
      padding: 30px 24px;
      border-radius: 30px;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 20px 80px rgba(0,0,0,0.45);
    }

    .phoneTitle {
      font-size: 22px;
      font-weight: 650;
      margin-bottom: 12px;
    }

    .phoneText {
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255,255,255,0.7);
      margin-bottom: 24px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 17px 20px;
      font-size: 17px;
      font-weight: 650;
      color: #05060a;
      background: white;
      cursor: pointer;
    }

    button.secondary {
      margin-top: 12px;
      color: white;
      background: rgba(255,255,255,0.18);
    }

    button:active {
      transform: scale(0.98);
    }

    .smallText {
      margin-top: 18px;
      font-size: 12px;
      line-height: 1.7;
      color: rgba(255,255,255,0.45);
    }

    .meter {
      margin-top: 22px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .meterFill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: white;
      transition: width 0.06s linear;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div id="status">loading...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "ここをあなたの Firebase 設定に戻してください",
      authDomain: "ここをあなたの Firebase 設定に戻してください",
      databaseURL: "ここをあなたの Firebase 設定に戻してください",
      projectId: "ここをあなたの Firebase 設定に戻してください",
      storageBucket: "ここをあなたの Firebase 設定に戻してください",
      messagingSenderId: "ここをあなたの Firebase 設定に戻してください",
      appId: "ここをあなたの Firebase 設定に戻してください",
      measurementId: "ここをあなたの Firebase 設定に戻してください"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getDatabase(firebaseApp);

    const params = new URLSearchParams(location.search);
    const mode = params.get("mode") || "display";

    const appEl = document.getElementById("app");
    const statusEl = document.getElementById("status");

    function makeRoomId() {
      return Math.random().toString(36).slice(2, 8);
    }

    function makeSessionId() {
      return Date.now().toString(36) + "-" + makeRoomId();
    }

    function getBaseUrl() {
      return location.origin + location.pathname;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function validNumber(value, fallback = 0) {
      if (typeof value === "number" && !Number.isNaN(value)) {
        return value;
      }
      return fallback;
    }

    if (mode === "phone") {
      startPhone();
    } else {
      startDisplay();
    }

    function startDisplay() {
      const room = makeRoomId();
      const sessionId = makeSessionId();

      const phoneUrl =
        `${getBaseUrl()}?mode=phone&room=${room}&session=${sessionId}`;

      history.replaceState(null, "", getBaseUrl());

      const qrUrl =
        "https://api.qrserver.com/v1/create-qr-code/?size=480x480&data=" +
        encodeURIComponent(phoneUrl);

      appEl.innerHTML = `
        <canvas id="canvas"></canvas>

        <div class="centerPanel" id="qrPanel">
          <h1>スマホを接続</h1>
          <p>
            パソコンとスマホをインターネットに接続してください。<br>
            スマホで QR コードを読み取り、<br>
            センサーを開始してください。
          </p>
          <img id="qr" src="${qrUrl}" alt="QR code" />
          <div id="roomText">room: ${room}<br>session: ${sessionId}</div>
        </div>
      `;

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const qrPanel = document.getElementById("qrPanel");

      let width = 0;
      let height = 0;

      let targetX = 0.5;
      let targetY = 0.5;
      let smoothX = 0.5;
      let smoothY = 0.5;
      let connected = false;

      function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        width = window.innerWidth;
        height = window.innerHeight;

        canvas.width = width * dpr;
        canvas.height = height * dpr;
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      const pointerRef = ref(db, `rooms/${room}/pointer`);

      onValue(pointerRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        if (data.sessionId !== sessionId) return;

        targetX = clamp(validNumber(data.pointerX, 0.5), 0, 1);
        targetY = clamp(validNumber(data.pointerY, 0.5), 0, 1);

        connected = true;
        statusEl.textContent =
          `connected / x:${targetX.toFixed(2)} y:${targetY.toFixed(2)}`;

        if (qrPanel) {
          qrPanel.style.opacity = "0";
          qrPanel.style.pointerEvents = "none";
        }
      });

      function drawLight() {
        if (connected) {
          smoothX += (targetX - smoothX) * 0.62;
          smoothY += (targetY - smoothY) * 0.62;
        }

        const dotX = smoothX * width;
        const dotY = smoothY * height;

        ctx.fillStyle = "rgba(5, 6, 10, 0.18)";
        ctx.fillRect(0, 0, width, height);

        const glow = ctx.createRadialGradient(dotX, dotY, 0, dotX, dotY, 180);
        glow.addColorStop(0, "rgba(255,255,255,1)");
        glow.addColorStop(0.06, "rgba(255,255,255,0.96)");
        glow.addColorStop(0.22, "rgba(180,210,255,0.45)");
        glow.addColorStop(1, "rgba(180,210,255,0)");

        ctx.beginPath();
        ctx.fillStyle = glow;
        ctx.arc(dotX, dotY, 180, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,255,255,0.28)";
        ctx.lineWidth = 1;
        ctx.arc(dotX, dotY, 22, 0, Math.PI * 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = "rgba(255,255,255,1)";
        ctx.arc(dotX, dotY, 7, 0, Math.PI * 2);
        ctx.fill();

        requestAnimationFrame(drawLight);
      }

      ctx.fillStyle = "#05060a";
      ctx.fillRect(0, 0, width, height);

      statusEl.textContent = "waiting for phone";
      drawLight();
    }

    function startPhone() {
      const room = params.get("room");
      const sessionId = params.get("session");

      if (!room || !sessionId) {
        appEl.innerHTML = `
          <div class="phoneScreen">
            <div class="phoneCard">
              <div class="phoneTitle">接続情報がありません</div>
              <div class="phoneText">
                パソコン画面の QR コードから開いてください。<br>
                通常のリンクを直接開いた場合、操作できません。
              </div>
            </div>
          </div>
        `;
        statusEl.textContent = "no room or session";
        return;
      }

      appEl.innerHTML = `
        <div class="phoneScreen">
          <div class="phoneCard">
            <div class="phoneTitle">レーザーポインター</div>
            <div class="phoneText">
              パソコンとスマホをインターネットに接続してください。<br>
              スマホをパソコン画面の中心に向けて、<br>
              「センサーを開始」を押してください。
            </div>

            <button id="startButton">センサーを開始</button>
            <button id="centerButton" class="secondary">中心を再設定</button>

            <div class="meter">
              <div class="meterFill" id="meterFill"></div>
            </div>

            <div class="smallText" id="phoneInfo">
              まずスマホを画面中央に向けてください。
            </div>
          </div>
        </div>
      `;

      const startButton = document.getElementById("startButton");
      const centerButton = document.getElementById("centerButton");
      const phoneInfo = document.getElementById("phoneInfo");
      const meterFill = document.getElementById("meterFill");

      const pointerRef = ref(db, `rooms/${room}/pointer`);

      let latestBeta = 0;
      let latestGamma = 0;

      let centerBeta = 0;
      let centerGamma = 0;

      let pointerX = 0.5;
      let pointerY = 0.5;

      let hasOrientation = false;
      let centerReady = false;
      let pendingCenterReset = false;

      let lastSendTime = 0;
      let sensorStarted = false;

      const rangeAngleX = 16;
      const rangeAngleY = 14;

      function angleToScreenOffset(deltaAngle, rangeAngle) {
        const rad = Math.PI / 180;
        return Math.tan(deltaAngle * rad) / (2 * Math.tan(rangeAngle * rad));
      }

      function deadzone(value, zone = 0.05) {
        if (Math.abs(value) < zone) return 0;
        return value;
      }

      async function requestPermissions() {
        let orientationAllowed = true;

        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          const result = await DeviceOrientationEvent.requestPermission();
          orientationAllowed = result === "granted";
        }

        return orientationAllowed;
      }

      function sendPointer(force = false) {
        const now = Date.now();

        if (!force && now - lastSendTime < 33) return;
        lastSendTime = now;

        const moveAmount =
          Math.abs(pointerX - 0.5) +
          Math.abs(pointerY - 0.5);

        meterFill.style.width = clamp(moveAmount * 180, 0, 100) + "%";

        set(pointerRef, {
          sessionId: sessionId,
          pointerX: pointerX,
          pointerY: pointerY,
          beta: latestBeta,
          gamma: latestGamma,
          time: now
        });

        statusEl.textContent =
          `sending / x:${pointerX.toFixed(2)} y:${pointerY.toFixed(2)}`;
      }

      function setCurrentDirectionAsCenter() {
        centerBeta = latestBeta;
        centerGamma = latestGamma;
        centerReady = true;

        pointerX = 0.5;
        pointerY = 0.5;

        sendPointer(true);

        phoneInfo.textContent = "現在のスマホの向きを画面中心として設定しました。";
      }

      function requestCenterReset() {
        if (hasOrientation) {
          setCurrentDirectionAsCenter();
        } else {
          pendingCenterReset = true;
          phoneInfo.textContent = "センサー値を取得したら中心を設定します。";
        }
      }

      function handleOrientation(event) {
        const beta = validNumber(event.beta, latestBeta);
        const gamma = validNumber(event.gamma, latestGamma);

        latestBeta = beta;
        latestGamma = gamma;
        hasOrientation = true;

        if (!centerReady || pendingCenterReset) {
          pendingCenterReset = false;
          setCurrentDirectionAsCenter();
        }

        const deltaBeta = deadzone(beta - centerBeta);
        const deltaGamma = deadzone(gamma - centerGamma);

        const offsetX = angleToScreenOffset(deltaGamma, rangeAngleX);
        const offsetY = angleToScreenOffset(deltaBeta, rangeAngleY);

        pointerX = clamp(0.5 - offsetX, 0, 1);
        pointerY = clamp(0.5 - offsetY, 0, 1);

        sendPointer(false);
      }

      startButton.addEventListener("click", async () => {
        try {
          const allowed = await requestPermissions();

          if (!allowed) {
            phoneInfo.textContent = "センサーの使用が許可されませんでした。";
            statusEl.textContent = "permission denied";
            return;
          }

          if (!sensorStarted) {
            window.addEventListener("deviceorientation", handleOrientation, true);
            sensorStarted = true;
          }

          pendingCenterReset = true;

          startButton.textContent = "センサー作動中";
          phoneInfo.textContent = "スマホを画面中央に向けたまま、少し待ってください。";
          statusEl.textContent = `room: ${room} / sensor started`;
        } catch (error) {
          phoneInfo.textContent = "センサー開始時にエラーが発生しました。";
          statusEl.textContent = "sensor error";
          console.error(error);
        }
      });

      centerButton.addEventListener("click", () => {
        requestCenterReset();
      });

      statusEl.textContent = `room: ${room}`;
    }
  </script>
</body>
</html>
